<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>octra stats | mainnet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma,arial,sans-serif;background:#F0F2F5;color:#2B3A52;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:40px 16px;font-size:12px;letter-spacing:0.5px}
.wrap{width:100%;max-width:860px;background:#fff;border:1px solid #D0D7E2;overflow:hidden}
.hdr{padding:14px 20px;border-bottom:1px solid #E5E9EF;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:14px;font-weight:600;color:#2B3A52}
.net-switch{font-size:11px;color:#8C9DB6;font-family:monospace;background:none;border:0px solid #D0D7E2;padding:3px 8px;cursor:pointer;letter-spacing:0.5px;display:flex;align-items:center}
.net-switch:hover{border-color:#8C9DB6;color:#3B567F}
.stats-row{display:flex;border-bottom:1px solid #D0D7E2}
.stat-box{flex:1;background:#E5E9EF;border-right:1px solid #D0D7E2;padding:8px 10px}
.stat-box:last-child{border-right:none}
.stat-box .lbl{font-size:11px;color:#8C9DB6;text-transform:lowercase;letter-spacing:0.5px}
.stat-box .val{font-size:13px;font-weight:bold;color:#3B567F;margin-top:2px;font-family:monospace}
.section-bar{display:flex;background:#D0D7E2;border-top:1px solid #C0C6D0;border-bottom:1px solid #C0C6D0}
.section-bar button{flex:1;padding:8px 20px;font-size:11px;font-weight:bold;border:none;background:transparent;cursor:pointer;color:#8C9DB6;letter-spacing:0.5px;text-transform:lowercase;font-family:Tahoma,arial,sans-serif;text-align:center}
.section-bar button.active{color:#3B567F;background:#C0C6D0}
.section-bar button:hover:not(.active){color:#3B567F}
.tf-bar{display:flex;border-bottom:1px solid #E5E9EF;background:#F7F8FA}
.tf-bar button{flex:1;padding:4px 0;font-size:11px;font-weight:500;border:none;background:transparent;cursor:pointer;color:#8C9DB6;border-bottom:2px solid transparent;transition:all 0.12s;font-family:Tahoma,arial,sans-serif;letter-spacing:0.5px}
.tf-bar button.active{color:#3B567F;border-bottom-color:#3B567F;background:#fff}
.tf-bar button:hover:not(.active){background:#E5E9EF;color:#3B567F}
.chart-wrap{position:relative;padding:16px 20px 12px;min-height:240px}
.chart-status{padding:40px 20px;text-align:center;font-size:12px;color:#8C9DB6;display:none}
.chart-status.show{display:block}
.chart-tooltip{position:absolute;background:#2B3A52;color:#fff;font-size:11px;padding:6px 10px;pointer-events:none;display:none;font-family:Tahoma,arial,sans-serif;letter-spacing:0.3px;line-height:1.6;white-space:nowrap;z-index:10}
.legend-bar{display:none;padding:6px 20px 10px;background:#fff;border-top:1px solid #E5E9EF}
.legend-bar>div{display:flex;gap:16px}
.legend-bar.show{display:flex}
.legend-item{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;font-size:11px;color:#2B3A52;letter-spacing:0.5px}
.legend-item .swatch{width:10px;height:10px;flex-shrink:0}
.legend-item.off .swatch{opacity:0.25}
.legend-item.off span{color:#B0BAC8}
.legend-item.legend-val{cursor:default;align-items:center}
.legend-item.legend-val .val-line{font-size:11px;letter-spacing:0.5px;line-height:13px}
.legend-item.legend-val .val-prefix{color:#2B3A52;user-select:none}
.legend-item.legend-val .val-addr{font-size:11px;line-height:13px;color:#3B567F;word-break:break-all;user-select:text;cursor:text;-webkit-user-select:text}
.leg-num{color:#8C9DB6;font-family:monospace;margin-left:5px;font-size:11px;position:relative;top:1px}
.footer-bar{padding:6px 20px;background:#D0D7E2;border-top:1px solid #C0C6D0;font-size:11px;color:#8C9DB6;display:flex;justify-content:space-between}
@media(max-width:600px){body{padding:0;align-items:stretch}.wrap{border:none;min-height:100vh}.stats-row{flex-wrap:wrap}.stat-box{flex:1 1 50%;border-bottom:1px solid #D0D7E2}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>octra stats</h1>
    <button class="net-switch" id="net-switch" data-net="mainnet" onclick="switchNetwork()">
      <span id="net-label">current network: mainnet</span>
    </button>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="lbl">total transactions</div><div class="val" id="st-txs">...</div></div>
    <div class="stat-box"><div class="lbl">total volume</div><div class="val" id="st-volume">...</div></div>
    <div class="stat-box"><div class="lbl">total accounts</div><div class="val" id="st-accounts">...</div></div>
    <div class="stat-box"><div class="lbl">circulating supply</div><div class="val" id="st-supply">...</div></div>
    <div class="stat-box"><div class="lbl">current epoch</div><div class="val" id="st-epoch">...</div></div>
    <div class="stat-box"><div class="lbl">total revenue</div><div class="val" id="st-revenue">...</div></div>
  </div>
  <div class="section-bar">
    <button id="sec-txs"     onclick="setSection('txs')"     class="active">transactions</button>
    <button id="sec-users"   onclick="setSection('users')">accounts</button>
    <button id="sec-revenue" onclick="setSection('revenue')">network revenue</button>
  </div>
  <div class="tf-bar">
    <button id="tf-MONTH" onclick="setTf('MONTH')">month</button>
    <button id="tf-WEEK"  onclick="setTf('WEEK')" class="active">week</button>
    <button id="tf-DAY"   onclick="setTf('DAY')">day</button>
  </div>
  <div class="chart-wrap" id="chart-wrap">
    <div class="chart-status show" id="chart-status">loading...</div>
    <canvas id="chart" style="display:none"></canvas>
    <div class="chart-tooltip" id="chart-tooltip"></div>
  </div>
  <div class="legend-bar" id="legend-bar">
    <div id="leg-set-txs">
      <div class="legend-item" id="leg-all" onclick="toggleLegend('all')">
        <div class="swatch" style="background:#8C9DB6"></div><span>all transactions</span><span class="leg-num" id="leg-num-all"></span>
      </div>
      <div class="legend-item" id="leg-enc" onclick="toggleLegend('enc')">
        <div class="swatch" style="background:#3B567F"></div><span>encrypted</span><span class="leg-num" id="leg-num-enc"></span>
      </div>
      <div class="legend-item" id="leg-rej" onclick="toggleLegend('rej')">
        <div class="swatch" style="background:#111"></div><span>rejected</span><span class="leg-num" id="leg-num-rej"></span>
      </div>
    </div>
    <div id="leg-set-users" style="display:none">
      <div class="legend-item" id="leg-uniq" onclick="toggleLegend('uniq')">
        <div class="swatch" style="background:#8C9DB6"></div><span>unique accounts</span><span class="leg-num" id="leg-num-uniq"></span>
      </div>
      <div class="legend-item" id="leg-new" onclick="toggleLegend('new')">
        <div class="swatch" style="background:#3B567F"></div><span>new accounts</span><span class="leg-num" id="leg-num-new"></span>
      </div>
    </div>
    <div id="leg-set-revenue" style="display:none">
      <div class="legend-item legend-val" id="leg-val-item">
        <div class="swatch" id="leg-val-swatch" style="background:#8C9DB6;flex-shrink:0"></div>
        <span class="val-line"><span class="val-prefix" id="leg-val-prefix">validators: …</span><span class="val-addr" id="leg-val-addr"></span></span>
      </div>
    </div>
  </div>
  <div class="footer-bar">
    <span id="footer-net">octra-data.mainnet · bigquery</span>
    <span id="last-updated"></span>
  </div>
</div>
<script>
let activeNetwork = 'mainnet';
const STATS_URLS = {
  mainnet: 'https://storage.googleapis.com/octra-data/mainnet/stats.json',
  devnet:  'https://storage.googleapis.com/octra-data/devnet/stats.json'
};

function switchNetwork() {
  activeNetwork = activeNetwork === 'mainnet' ? 'devnet' : 'mainnet';
  const btn = document.getElementById('net-switch');
  btn.setAttribute('data-net', activeNetwork);
  document.getElementById('net-label').textContent = 'current network: ' + activeNetwork;
  document.getElementById('footer-net').textContent = 'octra-data.' + activeNetwork + ' · bigquery';
  document.title = 'octra stats | ' + activeNetwork;
  cachedPayload = null;
  document.getElementById('leg-val-prefix').textContent = 'validators: …';
  document.getElementById('leg-val-addr').textContent = '';
  ['st-txs','st-volume','st-accounts','st-supply','st-epoch','st-revenue'].forEach(function(id) {
    document.getElementById(id).textContent = '...';
  });
  document.getElementById('last-updated').textContent = '';
  loadStats();
  setTf(activeTf);
}

let cachedPayload  = null;
let activeSection  = 'txs';
let activeTf       = 'WEEK';

async function loadPayload() {
  if (cachedPayload) return cachedPayload;
  const res = await fetch(STATS_URLS[activeNetwork]);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  cachedPayload = await res.json();
  return cachedPayload;
}

function parseRows(tf) {
  if (!cachedPayload) return [];
  const srcMap = {txs: 'charts', users: 'user_charts', revenue: 'revenue_charts'};
  const src = cachedPayload[srcMap[activeSection]];
  if (!src) return [];
  return src[tf] || [];
}

function fmtNum(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

const canvas  = document.getElementById('chart');
const ctx     = canvas.getContext('2d');
const tooltip = document.getElementById('chart-tooltip');
const wrap    = document.getElementById('chart-wrap');

let chartData   = [];
let barRects    = [];
let hoveredIdx  = -1;
const vis = {all: true, enc: true, rej: true, uniq: true, new: true};

function updateLegendCounts(data) {
  const ids = ['all','enc','rej','uniq','new'];
  if (!data || !data.length) {
    ids.forEach(k => { document.getElementById('leg-num-' + k).textContent = ''; });
    return;
  }
  const total = data.reduce((a, d) => a + (d.count           || 0), 0);
  const enc   = data.reduce((a, d) => a + (d.encrypted_count || 0), 0);
  const rej   = data.reduce((a, d) => a + (d.rejected_count  || 0), 0);
  const neu   = data.reduce((a, d) => a + (d.new_user_count  || 0), 0);
  if (activeSection === 'txs') {
    document.getElementById('leg-num-all').textContent  = total.toLocaleString();
    document.getElementById('leg-num-enc').textContent  = enc.toLocaleString();
    document.getElementById('leg-num-rej').textContent  = rej.toLocaleString();
    document.getElementById('leg-num-uniq').textContent = '';
    document.getElementById('leg-num-new').textContent  = '';
  } else if (activeSection === 'users') {
    document.getElementById('leg-num-all').textContent  = '';
    document.getElementById('leg-num-enc').textContent  = '';
    document.getElementById('leg-num-rej').textContent  = '';
    document.getElementById('leg-num-uniq').textContent = neu.toLocaleString();
    document.getElementById('leg-num-new').textContent  = 'time-based';
  }
}

function toggleLegend(key) {
  vis[key] = !vis[key];
  document.getElementById('leg-' + key).classList.toggle('off', !vis[key]);
  if (chartData.length) drawChart(chartData);
}

function drawChart(data) {
  const dpr  = window.devicePixelRatio || 1;
  const W    = wrap.clientWidth - 40;
  const H    = 220;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const PL = 54, PR = 12, PT = 14, PB = 42;
  const cW = W - PL - PR;
  const cH = H - PT - PB;

  ctx.clearRect(0, 0, W, H);

  if (!data.length) {
    ctx.fillStyle = '#8C9DB6';
    ctx.font = '11px Tahoma,arial,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('no data for this timeframe', W / 2, H / 2);
    barRects = [];
    return;
  }

  const allVals = data.map(d => {
    const showBase  = activeSection === 'txs' ? vis.all  : activeSection === 'users' ? vis.uniq : true;
    const showFront = activeSection === 'txs' ? vis.enc  : activeSection === 'users' ? vis.new  : false;
    const frontVal  = activeSection === 'users' ? (d.new_user_count || 0) : (d.encrypted_count || 0);
    const base  = showBase  ? d.count    : 0;
    const front = showFront ? frontVal   : 0;
    const rej   = (activeSection === 'txs' && vis.rej) ? (d.rejected_count || 0) : 0;
    return Math.max(base, front, rej, 1);
  });
  const maxVal  = Math.max(...allVals, 1);
  let scaleVal  = maxVal;
  if (activeSection === 'revenue') {
    const sorted = data.map(d => d.count).filter(v => v > 0).sort((a, b) => a - b);
    if (sorted.length > 0)
      scaleVal = sorted[Math.min(sorted.length - 1, Math.floor(sorted.length * 0.95))];
  }
  const rawStep   = scaleVal / 4;
  const mag       = Math.pow(10, Math.floor(Math.log10(rawStep || 1)));
  const yStep     = Math.ceil(rawStep / mag) * mag || 1;
  const yMax      = yStep * 4;
  const logRef = Math.log10(maxVal + 1);

  let T, gridVals;
  if (activeSection === 'users' || activeSection === 'txs') {
    T = v => maxVal > 0 ? Math.sqrt(Math.max(0, v) / maxVal) : 0;
    gridVals = [0];
    for (let k = 1; k <= 4; k++) {
      if (k === 4) { gridVals.push(maxVal); continue; }
      const rawV = maxVal * (k / 4) * (k / 4);
      const m = Math.pow(10, Math.floor(Math.log10(rawV || 1)));
      gridVals.push(Math.round(rawV / m) * m);
    }
  } else {
    T = v => logRef > 0 ? Math.log10(Math.max(0, v) + 1) / logRef : 0;
    const LOG_GRIDS = {
      revenue: [0, 10, 100, 100000, maxVal],
    };
    gridVals = (LOG_GRIDS[activeSection] || []).filter(v => v <= maxVal);
  }

  ctx.strokeStyle = '#E5E9EF';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#8C9DB6';
  ctx.font = '10px Tahoma,arial,sans-serif';
  ctx.textAlign = 'right';

  for (const v of gridVals) {
    const y = PT + cH - T(v) * cH;
    ctx.beginPath(); ctx.moveTo(PL, y); ctx.lineTo(PL + cW, y); ctx.stroke();
    ctx.fillText(v === 0 ? '0' : fmtNum(v), PL - 6, y + 3);
  }

  const n    = data.length;
  const gap  = Math.max(1, Math.round(cW / n * 0.12));
  const barW = Math.max(1, (cW - gap * (n - 1)) / n);
  barRects   = [];

  data.forEach((d, i) => {
    const bx        = PL + i * (barW + gap);
    const bh        = Math.max(d.count > 0 ? 1 : 0, T(d.count) * cH);
    const by        = PT + cH - bh;
    const frontVal  = activeSection === 'users'    ? (d.new_user_count   || 0)
                    : activeSection === 'txs'      ? (d.encrypted_count  || 0)
                    : 0;
    const fbh       = frontVal > 0 ? Math.max(1, T(frontVal) * cH) : 0;
    const rejVal    = activeSection === 'txs' ? (d.rejected_count || 0) : 0;
    const rbh       = rejVal > 0 ? Math.max(1, T(rejVal) * cH) : 0;
    const rby       = PT + cH - rbh;

    const showBase  = activeSection === 'txs' ? vis.all  : activeSection === 'users' ? vis.uniq : true;
    const showFront = activeSection === 'txs' ? vis.enc  : activeSection === 'users' ? vis.new  : true;
    const bars = [
      showBase                             ? {h: bh,  y: by,             base: (i === hoveredIdx) ? '#C0C6D0' : '#8C9DB6'} : null,
      showFront                            ? {h: fbh, y: PT + cH - fbh, base: (i === hoveredIdx) ? '#516E9A' : '#3B567F'} : null,
      (vis.rej && activeSection === 'txs') ? {h: rbh, y: rby,            base: (i === hoveredIdx) ? '#444'    : '#111'}    : null,
    ].filter(b => b && b.h > 0).sort((a, b) => b.h - a.h);

    for (const bar of bars) {
      ctx.fillStyle = bar.base;
      ctx.fillRect(Math.round(bx), Math.round(bar.y), Math.round(barW), Math.round(bar.h));
    }

    barRects.push({x: bx, w: barW + gap, idx: i});
  });

  ctx.fillStyle = '#8C9DB6';
  ctx.font = '10px Tahoma,arial,sans-serif';
  ctx.textAlign = 'center';
  let lastLabelX = -999;
  data.forEach((d, i) => {
    const m = d.bucket.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    const isWeekStart = !m || new Date(+m[1], +m[2] - 1, +m[3]).getDay() === 0;
    if (!isWeekStart) return;
    const cx = PL + i * (barW + gap) + barW / 2;
    if (cx - lastLabelX < 65) return;
    lastLabelX = cx;
    ctx.fillText(d.bucket, cx, H - PB + 14);
  });
}

canvas.addEventListener('mousemove', function(e) {
  const cr  = canvas.getBoundingClientRect();
  const wr  = wrap.getBoundingClientRect();
  const mx  = e.clientX - cr.left;
  let found = -1;
  for (const r of barRects) {
    if (mx >= r.x && mx < r.x + r.w) { found = r.idx; break; }
  }
  if (found !== hoveredIdx) {
    hoveredIdx = found;
    drawChart(chartData);
  }
  if (found >= 0) {
    const d = chartData[found];
    const enc  = d.encrypted_count || 0;
    const evol = d.encrypted_volume || 0;
    const neu  = d.new_user_count || 0;
    const rej  = d.rejected_count || 0;
    const rejenc = d.rejected_encrypted_count || 0;
    const body = activeSection === 'users'
      ? 'unique accounts: ' + d.count.toLocaleString() + (neu > 0 ? '<br>new accounts: ' + neu.toLocaleString() : '')
      : activeSection === 'revenue'
      ? 'revenue: ' + d.count.toLocaleString(undefined, {maximumFractionDigits: 3}) + ' OCT<br>txs: ' + (d.tx_count || 0).toLocaleString()
      : 'all txs: ' + d.count.toLocaleString() + '<br>vol: ' + d.volume.toLocaleString(undefined, {maximumFractionDigits: 3}) + ' OCT'
        + (enc > 0 ? '<br>encrypted txs: ' + enc.toLocaleString() + '<br>encrypted vol: ' + evol.toLocaleString(undefined, {maximumFractionDigits: 3}) + ' OCT' : '')
        + (rej > 0 ? '<br>rejected txs: ' + rej.toLocaleString() : '')
        + (rejenc > 0 ? '<br>rejected encrypted txs: ' + rejenc.toLocaleString() : '');
    tooltip.innerHTML = '<b>' + d.bucket + '</b><br>' + body;
    const tx = Math.min(e.clientX - wr.left + 14, wr.width - 165);
    const ty = Math.max(e.clientY - wr.top  - 14, 4);
    tooltip.style.left    = tx + 'px';
    tooltip.style.top     = ty + 'px';
    tooltip.style.display = 'block';
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mouseleave', function() {
  hoveredIdx = -1;
  tooltip.style.display = 'none';
  if (chartData.length) drawChart(chartData);
});

window.addEventListener('resize', function() {
  if (chartData.length) drawChart(chartData);
});

function setStatus(msg) {
  document.getElementById('chart-status').className = 'chart-status show';
  document.getElementById('chart-status').textContent = msg;
  canvas.style.display = 'none';
}

function showCanvas() {
  document.getElementById('chart-status').className = 'chart-status';
  canvas.style.display = 'block';
}

function renderValidatorLine() {
  const vals = cachedPayload && cachedPayload.validators;
  const sw = document.getElementById('leg-val-swatch');
  const pre = document.getElementById('leg-val-prefix');
  const adr = document.getElementById('leg-val-addr');
  if (!vals) return;
  const n = vals.length;
  if (n === 0) {
    sw.style.background = '#C0C6D0';
    pre.textContent = 'validators: none';
    adr.textContent = '';
    return;
  }
  sw.style.background = '#8C9DB6';
  pre.textContent = n === 1 ? 'validators: 1 · ' : 'validators: ' + n + ' · ';
  adr.textContent = n === 1 ? vals[0] : vals.join(', ');
}

async function setSection(sec) {
  activeSection = sec;
  document.querySelectorAll('.section-bar button').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + sec).classList.add('active');
  document.getElementById('legend-bar').classList.toggle('show', sec !== 'revenue' ? (sec === 'txs' || sec === 'users') : true);
  document.getElementById('leg-set-txs').style.display     = sec === 'txs'     ? 'flex' : 'none';
  document.getElementById('leg-set-users').style.display   = sec === 'users'   ? 'flex' : 'none';
  document.getElementById('leg-set-revenue').style.display = sec === 'revenue' ? 'flex' : 'none';
  if (sec === 'revenue') renderValidatorLine();
  await setTf(activeTf);
}

async function setTf(tf) {
  activeTf = tf;
  document.querySelectorAll('.tf-bar button').forEach(b => b.classList.remove('active'));
  document.getElementById('tf-' + tf).classList.add('active');
  setStatus('loading...');
  try {
    await loadPayload();
    chartData = parseRows(tf);
    showCanvas();
    drawChart(chartData);
    updateLegendCounts(chartData);
    if (activeSection === 'revenue') renderValidatorLine();
    const gen = cachedPayload.generated_at ? new Date(cachedPayload.generated_at).toLocaleTimeString() : '';
    document.getElementById('last-updated').textContent = gen ? 'generated ' + gen : '';
  } catch (e) {
    console.error('[stats] error loading', activeSection, tf, e);
    setStatus('error: ' + e.message);
  }
}

async function loadStats() {
  try {
    const p = await loadPayload();
    const s = p.stats || {};
    document.getElementById('st-txs').textContent      = (s.total_transactions || 0).toLocaleString();
    document.getElementById('st-volume').textContent   = (s.total_volume       || 0).toLocaleString(undefined, {maximumFractionDigits: 2}) + ' OCT';
    document.getElementById('st-accounts').textContent = (s.total_accounts     || 0).toLocaleString();
    document.getElementById('st-supply').textContent   = (s.supply             || 0).toLocaleString() + ' OCT';
    document.getElementById('st-epoch').textContent    = (s.epoch_id           || 0).toLocaleString();
    const revCharts = p.revenue_charts && p.revenue_charts.DAY;
    const totalRev  = revCharts ? revCharts.reduce((a, d) => a + d.count, 0) : 0;
    document.getElementById('st-revenue').textContent  = totalRev.toLocaleString(undefined, {maximumFractionDigits: 2}) + ' OCT';
  } catch (_) {
    ['st-txs', 'st-volume', 'st-accounts', 'st-supply', 'st-epoch', 'st-revenue'].forEach(function(id) {
      document.getElementById(id).textContent = '\u2014';
    });
  }
}

document.getElementById('legend-bar').classList.add('show');
document.getElementById('leg-set-txs').style.display   = 'flex';
document.getElementById('leg-set-users').style.display = 'none';
loadStats();
setTf('WEEK');
</script>
